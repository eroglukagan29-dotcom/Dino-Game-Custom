<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Dino - Ödüllü Yarışma!</title>
  <style>
    body { background: #f7f7f7; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: sans-serif; overflow: hidden; }
    canvas { border-bottom: 2px solid #535353; background-color: #fff; max-width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 4px; }
    .cheat-info { color: #d9534f; font-weight: bold; margin-bottom: 5px; height: 20px; }
    
    /* ÖZEL GÖRSEL YÜKLEME ALANI STİLLERİ */
    .custom-upload-container {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .upload-label {
      background-color: #535353;
      color: white;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    .upload-label:hover {
      background-color: #333;
    }
    #imageLoader {
      display: none;
    }

    /* 🚨 TAM EKRAN JUMPSCARE ALANI (HER ŞEYİN ÜSTÜNE ÇIKAR) */
    #jumpscare-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 99999;
      background-color: #fff; /* Flaş parlaması için ilk başta beyaz */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>

  <div id="status" class="cheat-info"></div>
  <canvas id="game" width="1000" height="400"></canvas>
  
  <div id="ui-elements" class="custom-upload-container">
    <label for="imageLoader" class="upload-label">Kendi Karakterini Yükle (PNG, JPG vb.)</label>
    <input type="file" id="imageLoader" accept="image/*">
    <div style="margin-top:10px; color:#666; font-weight: bold;">🔥 100 PUAN YAPAN BÜYÜK ÖDÜLÜN SAHİBİ OLUR! 🔥</div>
  </div>

  <div id="jumpscare-overlay"></div>

  <script>
    // SESLER
    const jumpSound = new Audio('jump.mp3');
    const dieSound = new Audio('die.mp3');
    const scareSound = new Audio('scare.mp3');

    // KONAMİ HİLESİ
    const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'KeyB', 'KeyA'];
    let konamiIndex = 0;
    let godMode = false;

    // OYUN AYARLARI
    let canvas, ctx;
    let sprImg = new Image();
    sprImg.src = "sprite.png";

    let restartImg = new Image();
    restartImg.src = "restart.png";

    let customDinoImg = new Image();
    let useCustomImage = false;

    let gamespeed = 0;
    let score = 0;
    let hscore = 0;
    let groundX = 0;
    let isGameOver = false; 

    // Jumpscare durum kontrolü
    let isJumpscareActive = false;
    let jumpscareEndTime = 0;

    let restartBtnArea = { x: 464, y: 180, w: 72, h: 64 }; 

    let dino = {
      x: 100,
      y: 200,
      w: 88,
      h: 94,
      vy: 0,
      jumpPower: -15,
      gravity: 0.8,
      onGround: false
    };

    let obstacles = [];
    let nextObstacleTimer = 0;

    window.onload = function() {
      canvas = document.getElementById('game');
      ctx = canvas.getContext('2d');
      
      document.addEventListener("keydown", handleInput);
      canvas.addEventListener("click", handleCanvasClick);
      canvas.addEventListener("touchstart", handleTouchStart);
      
      document.getElementById('imageLoader').addEventListener('change', handleImageUpload);
      requestAnimationFrame(gameLoop);
    };

    function handleImageUpload(e) {
      const reader = new FileReader();
      reader.onload = function(event) {
        customDinoImg.onload = function() {
          useCustomImage = true; 
        };
        customDinoImg.src = event.target.result;
      };
      if (e.target.files[0]) {
        reader.readAsDataURL(e.target.files[0]);
      }
    }

    function triggerJump() {
      if (isGameOver || isJumpscareActive) return;
      if (dino.onGround) {
        dino.vy = dino.jumpPower;
        dino.onGround = false;
        jumpSound.currentTime = 0;
        jumpSound.play().catch(()=>{});
      }
      if (gamespeed === 0) gamespeed = 7;
    }

    function handleInput(e) {
      if (isJumpscareActive) return; 

      if (e.code === konamiCode[konamiIndex]) {
        konamiIndex++;
        if (konamiIndex === konamiCode.length) {
          godMode = !godMode;
          document.getElementById('status').innerText = godMode ? "HİLE AKTİF: ÖLÜMSÜZ VE FIRTINA!" : "";
          gamespeed = godMode ? 25 : 7;
          konamiIndex = 0;
        }
      } else { konamiIndex = 0; }

      if ((e.code === "Space" || e.code === "ArrowUp")) {
        triggerJump();
      }
    }

    function handleTouchStart(e) {
      if (isJumpscareActive) {
        e.preventDefault();
        return;
      }
      if (!isGameOver) {
        triggerJump();
        e.preventDefault(); 
      }
    }

    function handleCanvasClick(e) {
      if (isJumpscareActive) return; 

      if (!isGameOver) {
        triggerJump();
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
      const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

      if (mouseX >= restartBtnArea.x && mouseX <= restartBtnArea.x + restartBtnArea.w &&
          mouseY >= restartBtnArea.y && mouseY <= restartBtnArea.y + restartBtnArea.h) {
        resetGame();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function update() {
      // Jumpscare bitiş zamanı kontrolü
      if (isJumpscareActive) {
        if (Date.now() > jumpscareEndTime) {
          isJumpscareActive = false;
          isGameOver = true;
          // Tam ekran katmanını kapat ve alt yazıları geri getir emmoğlu
          document.getElementById('jumpscare-overlay').style.display = 'none';
          document.getElementById('ui-elements').style.visibility = 'visible';
        }
        return;
      }

      if (gamespeed === 0) return;

      dino.vy += dino.gravity;
      dino.y += dino.vy;

      if (dino.y + dino.h > 350) {
        dino.y = 350 - dino.h;
        dino.vy = 0;
        dino.onGround = true;
      }

      groundX = (groundX + gamespeed) % 2404;
      score++;

      // 🚨 TAM 100 PUAN OLDUĞUNDA KORKU TÜNELİ BAŞLAR!
      if (Math.floor(score / 10) === 100) {
        triggerJumpscare();
        return;
      }

      nextObstacleTimer -= gamespeed;
      if (nextObstacleTimer <= 0) {
        obstacles.push({
          x: canvas.width,
          y: 255,
          w: 50,
          h: 100,
          type: Math.random() > 0.5 ? 652 : 446
        });
        nextObstacleTimer = Math.random() * (1500 - 800) + 800;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gamespeed;

        if (!godMode) {
          if (dino.x < obstacles[i].x + obstacles[i].w - 20 &&
              dino.x + dino.w - 20 > obstacles[i].x &&
              dino.y < obstacles[i].y + obstacles[i].h - 20 &&
              dino.y + dino.h - 20 > obstacles[i].y) {
            gameOver();
          }
        }

        if (obstacles[i].x < -100) obstacles.splice(i, 1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (isJumpscareActive) return; // Jumpscare varken canvas çizimini salla

      // Orijinal Zemin Çizimi
      ctx.drawImage(sprImg, 0, 104, 2404, 18, -groundX, 330, 2404, 18);
      ctx.drawImage(sprImg, 0, 104, 2404, 18, 2404 - groundX, 330, 2404, 18);

      // Orijinal Engelleri Çiz
      obstacles.forEach(ob => {
        ctx.drawImage(sprImg, ob.type, 2, ob.w, ob.h, ob.x, ob.y, ob.w, ob.h);
      });

      // Dinozor Çizimi
      if (godMode) ctx.globalAlpha = 0.5;

      if (useCustomImage) {
        ctx.drawImage(customDinoImg, dino.x, dino.y, dino.w, dino.h);
      } else {
        let frameX = 1338;
        if (isGameOver) {
          frameX = 1690;
        } else if (gamespeed > 0 && dino.onGround) {
          frameX = (Math.floor(Date.now() / 100) % 2 === 0) ? 1514 : 1602;
        }
        ctx.drawImage(sprImg, frameX, 0, 88, 94, dino.x, dino.y, dino.w, dino.h);
      }

      ctx.globalAlpha = 1.0;

      // Skor
      ctx.fillStyle = "#535353";
      ctx.font = "20px Courier New";
      ctx.fillText(`SKOR: ${Math.floor(score/10)}`, 50, 50);
      ctx.fillText(`EN YÜKSEK: ${hscore}`, 50, 80); 

      // Oyun Bittiyse Elementler
      if (isGameOver) {
        ctx.drawImage(sprImg, 954, 26, 381, 28, 310, 120, 381, 28);
        ctx.drawImage(restartImg, restartBtnArea.x, restartBtnArea.y, restartBtnArea.w, restartBtnArea.h);
      }
    }

    // 🚨 TAM EKRAN VE FLAŞ TETİKLEYİCİ CANAVAR FONKSİYON
    function triggerJumpscare() {
      gamespeed = 0;
      isJumpscareActive = true;
      jumpscareEndTime = Date.now() + 25000; // 25 saniye kilitli kalacak emmoğlu
      
      // Sesi açıp son ses patlatıyoruz hacım
      scareSound.currentTime = 0;
      scareSound.volume = 1.0;
      scareSound.play().catch(()=>{});

      const overlay = document.getElementById('jumpscare-overlay');
      const uiElements = document.getElementById('ui-elements');
      
      // Aşağıdaki yükleme butonunu ve yazıları gizle, tam ekran katmanını aç
      uiElements.style.visibility = 'hidden';
      overlay.style.backgroundImage = "none"; // İlk başta resim yok, sadece beyaz arka plan
      overlay.style.backgroundColor = "#fff"; // Saf beyaz flaş parlaması
      overlay.style.display = 'block';

      // 💥 FLAŞ ETKİSİ: 150 milisaniye (0.15 saniye) sonra bembeyaz ekranın yerine korkunç resmi bas!
      setTimeout(() => {
        overlay.style.backgroundImage = "url('jumpscare.png')";
      }, 150);
    }

    function gameOver() {
      dieSound.play().catch(()=>{});
      if (Math.floor(score/10) > hscore) hscore = Math.floor(score/10);
      gamespeed = 0;
      isGameOver = true;
    }

    function resetGame() {
      score = 0;
      obstacles = [];
      dino.y = 200;
      dino.vy = 0;
      dino.onGround = false;
      isGameOver = false;
      gamespeed = godMode ? 25 : 7;
    }
  </script>
</body>
</html>
